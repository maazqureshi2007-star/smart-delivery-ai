<!DOCTYPE html>
<html>
<head>
    <title>Smart Delivery AI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1e1e2f;
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            width: 250px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            margin-bottom: 8px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #2d6cdf;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1a4fbf;
        }
    </style>
</head>

<body>

<div class="panel">
    <h3>🚚 Smart Delivery AI</h3>

    <input id="start" placeholder="Start (lat,lon)">
    <input id="end" placeholder="End (lat,lon)">

    <button onclick="findRoute()">Find Route</button>
    <button onclick="runAI()">Run AI</button>
    <button onclick="getLocation()">My Location</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([21.1702, 72.8311], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];
let polyline = null;

// ---------------------------
// ADD MARKER
// ---------------------------
function addMarker(lat, lon, text="") {
    const marker = L.marker([lat, lon]).addTo(map);
    if (text) marker.bindPopup(text);
    markers.push(marker);
}

// ---------------------------
// CLEAR MAP
// ---------------------------
function clearMap() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if (polyline) {
        map.removeLayer(polyline);
        polyline = null;
    }
}

// ---------------------------
// FIND ROUTE (basic line)
// ---------------------------
function findRoute() {
    clearMap();

    const start = document.getElementById("start").value.split(",");
    const end = document.getElementById("end").value.split(",");

    const s = [parseFloat(start[0]), parseFloat(start[1])];
    const e = [parseFloat(end[0]), parseFloat(end[1])];

    addMarker(s[0], s[1], "Start");
    addMarker(e[0], e[1], "End");

    polyline = L.polyline([s, e], {color: 'blue'}).addTo(map);

    map.fitBounds(polyline.getBounds());
}

// ---------------------------
// GET CURRENT LOCATION
// ---------------------------
function getLocation() {
    navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        document.getElementById("start").value = lat + "," + lon;

        map.setView([lat, lon], 13);
        addMarker(lat, lon, "My Location");

    }, () => {
        alert("Location access denied");
    });
}

// ---------------------------
// RUN AI (CONNECT BACKEND)
// ---------------------------
async function runAI() {
    clearMap();

    const start = document.getElementById("start").value.split(",");
    const end = document.getElementById("end").value.split(",");

    const locations = [
        [parseFloat(start[0]), parseFloat(start[1])],
        [parseFloat(end[0]), parseFloat(end[1])]
    ];

    try {
        // RESET ENV
        await fetch("/openenv/reset", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ locations })
        });

        let current = 0;
        let visited = [];
        let route = [locations[0]];

        for (let i = 0; i < locations.length - 1; i++) {

            const res = await fetch("/openenv/step", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    current_index: current,
                    visited: visited
                })
            });

            const data = await res.json();

            visited.push(current);
            current = data.next_index;

            route.push(locations[current]);
        }

        // DRAW ROUTE
        route.forEach((loc, i) => {
            addMarker(loc[0], loc[1], "Stop " + i);
        });

        polyline = L.polyline(route, {color: 'red'}).addTo(map);
        map.fitBounds(polyline.getBounds());

    } catch (err) {
        console.error(err);
        alert("Backend not connected!");
    }
}
</script>

</body>
</html>
